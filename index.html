<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台大 × 大吸館：有料靈魂任務</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --ntu-red: #8B0000; --gold: #D4AF37; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f4f4f4; overflow: hidden; }
        
        header { background: var(--ntu-red); color: white; padding: 15px; text-align: center; font-weight: bold; position: relative; z-index: 1000; }
        #map { width: 100%; height: 50vh; border-bottom: 2px solid #ccc; }
        
        /* 紅色標誌 */
        .red-marker { filter: hue-rotate(140deg) brightness(0.9); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 380px; border-radius: 25px; padding: 40px 25px 25px 25px; position: relative; text-align: center; }
        
        /* 角色替代容器 */
        .character-emoji { position: absolute; top: -60px; right: 20px; font-size: 80px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        
        .btn-main { background: var(--ntu-red); color: white; border: none; padding: 16px; border-radius: 35px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        #camera-trigger { display: none; }
        #test-btn { position: fixed; bottom: 10px; right: 10px; font-size: 10px; padding: 5px; opacity: 0.5; z-index: 3000; }
    </style>
</head>
<body>

<header>大吸館：校園有料靈魂任務</header>
<div id="map"></div>

<!-- 1. 入口對話框 -->
<div class="modal" id="modal-welcome" style="display:flex;">
    <div class="modal-content">
        <h2 style="color:var(--ntu-red);">有料地圖啟動！</h2>
        <p style="font-size: 18px; font-weight: bold;">來指定通路拍照拿取優惠券</p>
        <button class="btn-main" onclick="confirmQuest()">按確認開始任務</button>
    </div>
</div>

<!-- 2. 拍照啟動器 -->
<div class="modal" id="modal-camera">
    <div class="modal-content">
        <div id="emoji-target" class="character-emoji"></div>
        <h3 id="target-name" style="color:var(--ntu-red); margin:0;"></h3>
        <p id="target-reward" style="color:var(--gold); font-weight:bold;"></p>
        <p style="font-size:14px; color:#666;">已抵達通路！請立即拍照認證領取優惠。</p>
        <button class="btn-main" onclick="openCamera()">📸 立即拍照</button>
    </div>
</div>

<!-- 3. 夜貓子限定 -->
<div class="modal" id="modal-night">
    <div class="modal-content">
        <h2 style="color:var(--ntu-red);">🌙 夜貓子獎勵</h2>
        <p>21:00 過後校園依然有料！</p>
        <p style="background:#fff9e6; padding:15px; border:1.5px dashed var(--gold); border-radius:10px;">獲得 7-11 兩件 75 折及免運券</p>
        <button class="btn-main" onclick="closeModal('modal-night')">收下優惠</button>
    </div>
</div>

<!-- 4. 人生三格合成 -->
<div class="modal" id="modal-final">
    <div class="modal-content">
        <h2 style="color:var(--ntu-red); margin:0;">🌟 任務達成！</h2>
        <p>你的校園人生三格已產出</p>
        <canvas id="strip-canvas" style="width:180px; border:5px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.2);"></canvas>
        <button class="btn-main" style="background:#E1306C;" onclick="location.href='https://instagram.com/'">上傳 IG 打卡領獎</button>
    </div>
</div>

<!-- 強制開啟相機 -->
<input type="file" id="camera-trigger" accept="image/*" capture="camera">
<button id="test-btn" onclick="toggleTest()">測試模式: OFF</button>

<script>
    // 使用 Emoji 替代 PNG 圖片
    const locations = {
        seven: { lat: 25.0137, lng: 121.5363, name: "7-11 卓聯門市", reward: "第2件8折", emoji: "🍋" },
        family: { lat: 25.0191, lng: 121.5422, name: "全家 台大楓林店", reward: "兩件88折", emoji: "🍎" },
        coop: { lat: 25.0176, lng: 121.5372, name: "台大合作社", reward: "第2件加15元多1件", emoji: "💎" }
    };

    let map = L.map('map').setView([25.0175, 121.5397], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let state = { active: false, collected: {seven:false, family:false, coop:false}, photos:[], isTest: false };

    // 放置標記
    Object.keys(locations).forEach(key => {
        const l = locations[key];
        let m = L.marker([l.lat, l.lng]).addTo(map);
        m._icon.classList.add('red-marker');
        m.bindPopup(`<b>${l.name}</b><br>拍照領：${l.reward}`);
    });

    // 夜貓子標點 (21:00 限定)
    let nm = L.marker([25.0145, 121.5355]).addTo(map);
    nm._icon.classList.add('red-marker');
    nm.bindPopup("<b>🌙 夜貓子專區</b><br>21:00 之後活動");

    function confirmQuest() {
        state.active = true;
        closeModal('modal-welcome');
        // 夜貓子時間判斷
        const h = new Date().getHours();
        if (h >= 21 || h < 5) showModal('modal-night');
    }

    map.locate({watch: true, enableHighAccuracy: true});
    map.on('locationfound', e => {
        if (!state.active) return;
        const u = e.latlng;
        for (let key in state.collected) {
            if (!state.collected[key]) {
                const loc = locations[key];
                // 距離偵測 (50公尺)
                if (map.distance(u, [loc.lat, loc.lng]) < 50 || state.isTest) {
                    triggerCameraUI(key);
                    break;
                }
            }
        }
    });

    function triggerCameraUI(key) {
        window.currentKey = key;
        const loc = locations[key];
        document.getElementById('target-name').innerText = loc.name;
        document.getElementById('target-reward').innerText = "獎勵：" + loc.reward;
        document.getElementById('emoji-target').innerText = loc.emoji;
        showModal('modal-camera');
    }

    function openCamera() { document.getElementById('camera-trigger').click(); }

    document.getElementById('camera-trigger').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.photos.push(ev.target.result);
                state.collected[window.currentKey] = true;
                closeModal('modal-camera');
                alert(`「${locations[window.currentKey].name}」認證成功！`);
                if (Object.values(state.collected).every(v => v)) generateStrip();
            };
            reader.readAsDataURL(file);
        }
    });

    function generateStrip() {
        const canvas = document.getElementById('strip-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 300; canvas.height = 700;
        ctx.fillStyle = "white"; ctx.fillRect(0,0,300,700);
        
        let loaded = 0;
        state.photos.forEach((src, i) => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 20, 20 + (i * 220), 260, 200);
                loaded++;
                if (loaded === 3) {
                    ctx.fillStyle = "#8B0000"; ctx.font = "bold 20px Arial";
                    ctx.fillText("台大 × 大吸館 有料三格", 45, 680);
                    showModal('modal-final');
                }
            };
            img.src = src;
        });
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTest() { 
        state.isTest = !state.isTest; 
        document.getElementById('test-btn').innerText = `測試模式: ${state.isTest ? 'ON' : 'OFF'}`;
        if (state.isTest) alert("測試模式已開啟，現在點擊地圖上的紅標即可觸發拍照！");
    }
</script>
</body>
</html>
